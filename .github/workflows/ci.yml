name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version
          docker --version
          docker info

      - name: Compile services
        run: mvn -DskipTests package

      - name: Run hermetic tests
        run: |
          set +e
          mvn test
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "==== Surefire reports ===="
            find . -path "*/target/surefire-reports/*.txt" -print -exec cat {} \;
          fi
          exit "$status"
